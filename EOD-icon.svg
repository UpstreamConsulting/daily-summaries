<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="#2a2a2a"/>

  <!-- Horizon lines left and right of moon -->
  <line x1="10" y1="65" x2="28" y2="65" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="65" x2="90" y2="65" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom horizon line full width -->
  <line x1="10" y1="73" x2="90" y2="73" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Moon half circle - off white -->
  <path d="M 25 65 A 25 25 0 0 1 75 65" fill="none" stroke="#e8e4d9" stroke-width="3" stroke-linecap="round"/>

  <!-- Crater 1 - small circle left of center -->
  <circle cx="38" cy="55" r="4" fill="none" stroke="#e8e4d9" stroke-width="2"/>

  <!-- Crater 2 - tiny circle right of center -->
  <circle cx="58" cy="60" r="2.5" fill="none" stroke="#e8e4d9" stroke-width="2"/>
</svg>
