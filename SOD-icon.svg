<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Light background -->
  <rect width="100" height="100" rx="22" fill="#f0f0f0"/>

  <!-- Horizon lines left and right of sun -->
  <line x1="10" y1="65" x2="28" y2="65" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="72" y1="65" x2="90" y2="65" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom horizon line full width -->
  <line x1="10" y1="73" x2="90" y2="73" stroke="#444" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Sun half circle - yellow orange -->
  <path d="M 25 65 A 25 25 0 0 1 75 65" fill="none" stroke="#f0a500" stroke-width="3" stroke-linecap="round"/>

  <!-- Sun rays - yellow orange -->
  <line x1="50" y1="33" x2="50" y2="26" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="30" y1="42" x2="24" y2="37" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="70" y1="42" x2="76" y2="37" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="22" y1="58" x2="15" y2="56" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="78" y1="58" x2="85" y2="56" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
</svg>
